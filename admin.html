<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
        }
        .container{
            width:70%;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:50px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        h1{
            color:#1f4e79;
        }
        table{
            width:100%;
            border-collapse:collapse;
        }
        th,td{
            border:1px solid gray;
            padding:10px;
        }
        th{
            background:#1f4e79;
            color:white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <table>
        <tr>
            <th>Student Name</th>
            <th>Branch</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Student 1</td>
            <td>CSE</td>
            <td>Placed</td>
        </tr>
        <tr>
            <td>Student 2</td>
            <td>ECE</td>
            <td>Pending</td>
        </tr>
    </table>
</div>

</body>
</html>
