<!DOCTYPE html>
<html>
<head>
    <title>Company Registration</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 450px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
            color: #1f4e79;
        }

        label{
            font-weight: bold;
        }

        input{
            width: 95%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #1f4e79;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover{
            background-color: #163a5a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Company Registration</h1>

    <form>
        <label>Company Name</label>
        <input type="text" placeholder="Enter company name">

        <label>Email</label>
        <input type="email" placeholder="Enter company email">

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter contact number">

        <label>Job Role</label>
        <input type="text" placeholder="Enter job role">

        <label>Package (LPA)</label>
        <input type="text" placeholder="Enter package">

        <button type="submit">Register Company</button>
    </form>
</div>

</body>
</html>
