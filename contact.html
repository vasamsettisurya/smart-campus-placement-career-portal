<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            text-align:center;
        }

        .container{
            width:450px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:#1f4e79;
        }

        input, textarea{
            width:95%;
            padding:10px;
            margin:10px 0;
            border:1px solid gray;
            border-radius:5px;
        }

        button{
            padding:12px 20px;
            background:#1f4e79;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Contact Us</h1>

    <form>
        <input type="text" placeholder="Enter your name">

        <input type="email" placeholder="Enter your email">

        <textarea rows="5" placeholder="Enter your message"></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
