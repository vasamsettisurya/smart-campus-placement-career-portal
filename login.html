<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Campus Placement Portal</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
        }
        .login-box{
            width:300px;
            margin:100px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }
        input{
            width:90%;
            padding:10px;
            margin:10px;
        }
        button{
            padding:10px 20px;
            background:#1f4e79;
            color:white;
            border:none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
