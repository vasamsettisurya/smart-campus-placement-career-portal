<!DOCTYPE html>
<html>
<head>
    <title>Placement Details</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
        }
        .container{
            width:80%;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:50px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        h1{
            color:#1f4e79;
        }
        table{
            width:100%;
            border-collapse:collapse;
        }
        th,td{
            border:1px solid gray;
            padding:12px;
        }
        th{
            background:#1f4e79;
            color:white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Placement Details</h1>

    <table>
        <tr>
            <th>Company</th>
            <th>Role</th>
            <th>Package</th>
            <th>Eligible Branch</th>
        </tr>
        <tr>
            <td>TCS</td>
            <td>Software Engineer</td>
            <td>4 LPA</td>
            <td>ECE/CSE</td>
        </tr>
        <tr>
            <td>Infosys</td>
            <td>System Engineer</td>
            <td>3.6 LPA</td>
            <td>All Branches</td>
        </tr>
        <tr>
            <td>Wipro</td>
            <td>Project Engineer</td>
            <td>4.5 LPA</td>
            <td>ECE/CSE</td>
        </tr>
    </table>
</div>

</body>
</html>
