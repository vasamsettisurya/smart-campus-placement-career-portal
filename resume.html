<!DOCTYPE html>
<html>
<head>
    <title>Resume Upload</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            text-align:center;
        }

        .container{
            width:400px;
            margin:100px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:#1f4e79;
        }

        input{
            margin:15px;
        }

        button{
            padding:10px 20px;
            background:#1f4e79;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Resume Upload</h1>

    <form>
        <input type="file"><br>
        <button type="submit">Upload Resume</button>
    </form>
</div>

</body>
</html>
